<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treino — 22/04/2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary:    #c2683a;
            --bg:         #faf7f2;
            --card:       #f5f0e8;
            --text:       #2c1810;
            --muted:      #8c7b6e;
            --border:     #e8e0d5;
            --shadow:     0 1px 3px rgba(44,24,16,.06);
            --radius:     10px;
            --green:      #4a7c59;
            --green-bg:   #f0f7f2;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            max-width: 640px;
            margin: 0 auto;
            padding: 1rem 1rem 3rem;
            -webkit-font-smoothing: antialiased;
        }

        .back-link {
            display: inline-flex; align-items: center; gap: 0.4rem;
            font-size: 0.82rem; font-weight: 600; color: var(--primary);
            text-decoration: none; background: #ede8df;
            border: 1px solid var(--border); border-radius: 999px;
            padding: 0.35rem 0.9rem; margin-bottom: 1rem; transition: background .15s;
        }
        .back-link:hover { background: #e0d8ce; }
        .back-link::before { content: '←'; }

        .hero {
            background: transparent; padding: 2rem 0 1.25rem; text-align: left;
            margin-bottom: 1.5rem; border-bottom: 1.5px solid var(--border);
        }
        .hero h1 {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 2rem; font-weight: 700; color: var(--text);
            letter-spacing: -0.01em; line-height: 1.15;
        }
        .hero-sub {
            color: var(--primary); margin-top: 0.3rem; font-size: 0.78rem;
            font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
        }
        .hero-badge {
            display: inline-block; margin-top: 0.6rem; background: #ede8df;
            border: 1px solid var(--border); color: var(--text);
            border-radius: 999px; padding: 0.28rem 0.875rem; font-size: 0.82rem; font-weight: 600;
        }

        .card {
            background: var(--card); border-radius: var(--radius);
            padding: 1.5rem; margin-bottom: 0.75rem;
            border: 1px solid var(--border); box-shadow: var(--shadow);
        }
        .sec-head {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.25rem;
        }
        .sec-icon {
            width: 32px; height: 32px;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.05rem;
            flex-shrink: 0;
            background: #ede8df;
        }
        .sec-title { font-size: 0.92rem; font-weight: 700; color: var(--text); }

        .exercise-list { list-style: none; }
        .exercise-item {
            display: flex;
            align-items: center;
            gap: 0.875rem;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--border);
        }
        .exercise-item:last-child { border-bottom: none; }
        .exercise-number {
            width: 30px; height: 30px;
            border-radius: 50%;
            background: var(--primary);
            color: #faf7f2;
            font-size: 0.75rem;
            font-weight: 700;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .exercise-name { font-size: 0.95rem; font-weight: 500; }

        footer {
            text-align: center; color: var(--muted); font-size: 0.75rem;
            margin-top: 2.5rem; padding-top: 1rem; border-top: 1px solid var(--border);
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-link">Voltar ao dia</a>

    <div class="hero">
        <h1>Treino de Hoje</h1>
        <p class="hero-sub">Quarta-feira &middot; 22/04/2026</p>
        <span class="hero-badge">Pernas</span>
    </div>

    <div class="card">
        <div class="sec-head">
            <span class="sec-icon">💪</span>
            <span class="sec-title">Exercícios</span>
        </div>
        <ol class="exercise-list">
            
            <li class="exercise-item">
                <span class="exercise-number">1</span>
                <span class="exercise-name">Agachamento</span>
            </li>
            
            <li class="exercise-item">
                <span class="exercise-number">2</span>
                <span class="exercise-name">Cadeira Extensora</span>
            </li>
            
            <li class="exercise-item">
                <span class="exercise-number">3</span>
                <span class="exercise-name">Flexora</span>
            </li>
            
            <li class="exercise-item">
                <span class="exercise-number">4</span>
                <span class="exercise-name">Adutora</span>
            </li>
            
            <li class="exercise-item">
                <span class="exercise-number">5</span>
                <span class="exercise-name">Abdutora</span>
            </li>
            
            <li class="exercise-item">
                <span class="exercise-number">6</span>
                <span class="exercise-name">Leg Press</span>
            </li>
            
        </ol>
    </div>

    <footer>
        Gerado em 07:11 &middot; Daily Organizer
    </footer>

</body>
</html>
