<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corrida — 01/05/2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary:    #c2683a;
            --bg:         #faf7f2;
            --card:       #f5f0e8;
            --text:       #2c1810;
            --muted:      #8c7b6e;
            --border:     #e8e0d5;
            --shadow:     0 1px 3px rgba(44,24,16,.06);
            --radius:     10px;
            --green:      #4a7c59;
            --green-bg:   #f0f7f2;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            max-width: 640px;
            margin: 0 auto;
            padding: 1rem 1rem 3rem;
            -webkit-font-smoothing: antialiased;
        }

        .back-link {
            display: inline-flex; align-items: center; gap: 0.4rem;
            font-size: 0.82rem; font-weight: 600; color: var(--primary);
            text-decoration: none; background: #ede8df;
            border: 1px solid var(--border); border-radius: 999px;
            padding: 0.35rem 0.9rem; margin-bottom: 1rem; transition: background .15s;
        }
        .back-link:hover { background: #e0d8ce; }
        .back-link::before { content: '←'; }

        .hero {
            background: transparent; padding: 2rem 0 1.25rem; text-align: left;
            margin-bottom: 1.5rem; border-bottom: 1.5px solid var(--border);
        }
        .hero h1 {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 2rem; font-weight: 700; color: var(--text);
            letter-spacing: -0.01em; line-height: 1.15;
        }
        .hero-sub {
            color: var(--primary); margin-top: 0.3rem; font-size: 0.78rem;
            font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
        }
        .hero-badge {
            display: inline-block; margin-top: 0.6rem; background: #ede8df;
            border: 1px solid var(--border); color: var(--text);
            border-radius: 999px; padding: 0.28rem 0.875rem; font-size: 0.82rem; font-weight: 600;
        }

        .card {
            background: var(--card); border-radius: var(--radius);
            padding: 1.5rem; margin-bottom: 0.75rem;
            border: 1px solid var(--border); box-shadow: var(--shadow);
        }
        .sec-head {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.25rem;
        }
        .sec-icon {
            width: 32px; height: 32px;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.05rem;
            flex-shrink: 0;
            background: #ede8df;
        }
        .sec-title { font-size: 0.92rem; font-weight: 700; color: var(--text); }

        /* Meta de Hoje */
        .goal-text {
            font-size: 1.05rem;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 0.5rem;
            line-height: 1.5;
        }
        .goal-text.done { color: var(--green); font-size: 1.1rem; font-weight: 600; }
        .session-label { font-size: 0.82rem; color: var(--muted); margin-bottom: 1rem; font-weight: 500; }

        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.25rem;
            background: #ede8df;
            border-radius: 10px;
            padding: 0.75rem;
        }
        .running-checkbox {
            appearance: none;
            -webkit-appearance: none;
            width: 22px; height: 22px;
            border: 2px solid var(--primary);
            border-radius: 6px;
            cursor: pointer;
            flex-shrink: 0;
            position: relative;
            transition: background .15s;
        }
        .running-checkbox:checked { background: var(--primary); }
        .running-checkbox:checked::after {
            content: '';
            position: absolute;
            left: 4px; top: 1px;
            width: 10px; height: 6px;
            border-left: 2.5px solid #fff;
            border-bottom: 2.5px solid #fff;
            transform: rotate(-45deg);
        }
        .checkbox-label { font-size: 0.92rem; color: var(--text); cursor: pointer; font-weight: 500; }

        .progress-bar-wrap {
            background: var(--border);
            border-radius: 999px;
            height: 8px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: var(--primary);
            border-radius: 999px;
            transition: width .4s ease;
        }
        .progress-label {
            font-size: 0.78rem;
            color: var(--muted);
            margin-top: 0.45rem;
            text-align: right;
            font-weight: 500;
        }

        /* Info table */
        .info-table { width: 100%; border-collapse: collapse; }
        .info-table tr { border-bottom: 1px solid var(--border); }
        .info-table tr:last-child { border-bottom: none; }
        .info-table td { padding: 0.55rem 0; font-size: 0.9rem; }
        .info-table td:first-child { color: var(--muted); width: 55%; }
        .info-table td:last-child { font-weight: 600; color: var(--text); text-align: right; }

        /* Calendário */
        .cal-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.875rem;
        }
        .cal-nav-btn {
            width: 34px; height: 34px;
            border-radius: 50%;
            background: #ede8df;
            border: 1.5px solid var(--border);
            font-size: 1.2rem;
            cursor: pointer;
            color: var(--muted);
            display: flex; align-items: center; justify-content: center;
            transition: all .15s;
            line-height: 1;
        }
        .cal-nav-btn:hover { background: var(--primary); border-color: var(--primary); color: #faf7f2; }
        .cal-month-label { font-size: 0.95rem; font-weight: 700; color: var(--text); }

        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 3px;
        }
        .cal-day-header {
            text-align: center;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--muted);
            padding: 0.25rem 0 0.4rem;
            letter-spacing: 0.03em;
        }
        .cal-cell {
            aspect-ratio: 1;
            display: flex; align-items: center; justify-content: center;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--muted);
            position: relative;
        }
        .cal-cell.empty { background: none; }
        .cal-cell.cal-future { color: #c9bfb4; }
        .cal-cell.cal-today {
            background: #ede8df;
            border: 2px solid var(--primary);
            color: var(--primary);
            font-weight: 700;
        }
        .cal-cell.cal-done {
            background: var(--primary);
            color: #faf7f2;
            font-weight: 700;
            cursor: pointer;
        }
        .cal-cell.cal-done:hover { background: #a85730; }
        .cal-cell.cal-done::after {
            content: '';
            position: absolute;
            bottom: 3px;
            width: 4px; height: 4px;
            border-radius: 50%;
            background: rgba(255,255,255,.65);
        }
        .cal-cell.cal-today.cal-done {
            background: var(--primary);
            border-color: #a85730;
            color: #faf7f2;
        }

        .cal-detail {
            margin-top: 0.875rem;
            padding: 0.875rem 1rem;
            background: #ede8df;
            border-radius: 12px;
            border-left: 3px solid var(--primary);
            display: none;
        }
        .cal-detail-date {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 0.3rem;
        }
        .cal-detail-session { font-size: 0.8rem; color: var(--muted); margin-bottom: 0.3rem; }
        .cal-detail-goal { font-size: 0.9rem; font-weight: 600; color: var(--text); line-height: 1.45; }

        footer {
            text-align: center; color: var(--muted); font-size: 0.75rem;
            margin-top: 2.5rem; padding-top: 1rem; border-top: 1px solid var(--border);
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-link">Voltar ao dia</a>

    <div class="hero">
        <h1>Corrida de Hoje</h1>
        <p class="hero-sub">Sexta-feira &middot; 01/05/2026</p>
        <span class="hero-badge">Meta: 10km em 4 meses</span>
    </div>

    <!-- Meta de Hoje -->
    <div class="card">
        <div class="sec-head">
            <span class="sec-icon">🏃</span>
            <span class="sec-title">Meta de Hoje</span>
        </div>
        <p class="goal-text" id="goal-text">Carregando...</p>
        <p class="session-label" id="session-label"></p>
        <div class="checkbox-row">
            <input type="checkbox" class="running-checkbox" id="running-done" onchange="toggleRunning(this.checked)">
            <label class="checkbox-label" for="running-done">Corrida concluída hoje</label>
        </div>
        <div class="progress-bar-wrap">
            <div class="progress-bar-fill" id="progress-fill" style="width: 0%"></div>
        </div>
        <div class="progress-label" id="progress-label">0 / 32 corridas</div>
    </div>

    <!-- Histórico: Calendário -->
    <div class="card">
        <div class="sec-head">
            <span class="sec-icon">📅</span>
            <span class="sec-title">Histórico de Corridas</span>
        </div>
        <div class="cal-nav">
            <button class="cal-nav-btn" onclick="calPrev()">&#8249;</button>
            <span class="cal-month-label" id="cal-month-label"></span>
            <button class="cal-nav-btn" onclick="calNext()">&#8250;</button>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
        <div class="cal-detail" id="cal-detail">
            <div class="cal-detail-date" id="cal-detail-date"></div>
            <div class="cal-detail-session" id="cal-detail-session"></div>
            <div class="cal-detail-goal" id="cal-detail-goal"></div>
        </div>
    </div>

    <!-- Plano -->
    <div class="card">
        <div class="sec-head">
            <span class="sec-icon">📋</span>
            <span class="sec-title">Plano</span>
        </div>
        <table class="info-table">
            <tr><td>Meta final</td><td>10km em 4 meses</td></tr>
            <tr><td>Início</td><td>11/03/2026</td></tr>
            <tr><td>Frequência</td><td>2x por semana</td></tr>
            <tr><td>Total de sessões</td><td>32</td></tr>
        </table>
    </div>

    <footer>
        Gerado em 07:23 &middot; Daily Organizer
    </footer>

    <script>
        const LS_KEY       = 'daily-organizer-running';
        const SESSIONS     = [{"duration_minutes": 10, "goal_description": "Corra 10 minutos cont\u00ednuos em ritmo leve (pace: conseguir falar frases curtas)", "session": 1, "week": 1}, {"duration_minutes": 18, "goal_description": "Alterne: 2 min correndo + 1 min caminhando \u00d7 6 s\u00e9ries (18 min total)", "session": 2, "week": 1}, {"duration_minutes": 12, "goal_description": "Corra 12 minutos cont\u00ednuos em ritmo leve (pace: conseguir falar frases curtas)", "session": 3, "week": 2}, {"duration_minutes": 20, "goal_description": "Alterne: 3 min correndo + 1 min caminhando \u00d7 5 s\u00e9ries (20 min total)", "session": 4, "week": 2}, {"duration_minutes": 15, "goal_description": "Corra 15 minutos cont\u00ednuos em ritmo leve (pace: conseguir falar frases curtas)", "session": 5, "week": 3}, {"duration_minutes": 20, "goal_description": "Alterne: 4 min correndo + 1 min caminhando \u00d7 4 s\u00e9ries (20 min total)", "session": 6, "week": 3}, {"duration_minutes": 18, "goal_description": "Corra 18 minutos cont\u00ednuos em ritmo leve (pace: conseguir falar frases curtas)", "session": 7, "week": 4}, {"duration_minutes": 24, "goal_description": "Alterne: 5 min correndo + 1 min caminhando \u00d7 4 s\u00e9ries (24 min total)", "session": 8, "week": 4}, {"duration_minutes": 20, "goal_description": "Corra 20 minutos cont\u00ednuos, pace livre", "session": 9, "week": 5}, {"distance_km": 2, "goal_description": "Corra 2km sem parar em ritmo confort\u00e1vel", "session": 10, "week": 5}, {"duration_minutes": 25, "goal_description": "Corra 25 minutos cont\u00ednuos, pace livre", "session": 11, "week": 6}, {"distance_km": 2.5, "goal_description": "Corra 2.5km sem parar em ritmo confort\u00e1vel", "session": 12, "week": 6}, {"duration_minutes": 30, "goal_description": "Corra 30 minutos cont\u00ednuos, pace livre", "session": 13, "week": 7}, {"distance_km": 3, "goal_description": "Corra 3km sem parar em ritmo confort\u00e1vel", "session": 14, "week": 7}, {"duration_minutes": 35, "goal_description": "Corra 35 minutos cont\u00ednuos, pace livre", "session": 15, "week": 8}, {"distance_km": 3.5, "goal_description": "Corra 3.5km sem parar em ritmo confort\u00e1vel", "session": 16, "week": 8}, {"distance_km": 4, "goal_description": "Corra 4km sem parar em ritmo confort\u00e1vel", "session": 17, "week": 9}, {"distance_km": 4.5, "goal_description": "Corra 4.5km sem parar em ritmo confort\u00e1vel", "session": 18, "week": 9}, {"distance_km": 5, "goal_description": "Corra 5km sem parar em ritmo confort\u00e1vel", "session": 19, "week": 10}, {"distance_km": 5.5, "goal_description": "Corra 5.5km sem parar em ritmo confort\u00e1vel", "session": 20, "week": 10}, {"distance_km": 6, "goal_description": "Corra 6km sem parar em ritmo confort\u00e1vel", "session": 21, "week": 11}, {"distance_km": 7, "goal_description": "Corra 7km sem parar em ritmo confort\u00e1vel", "session": 22, "week": 11}, {"distance_km": 8, "goal_description": "Corra 8km sem parar em ritmo confort\u00e1vel", "session": 23, "week": 12}, {"distance_km": 5, "goal_description": "Corra 5km, mantendo pace constante do in\u00edcio ao fim", "session": 24, "week": 12}, {"distance_km": 6, "goal_description": "Corra 6km, mantendo pace constante do in\u00edcio ao fim", "session": 25, "week": 13}, {"distance_km": 7, "goal_description": "Corra 7km, mantendo pace constante do in\u00edcio ao fim", "session": 26, "week": 13}, {"distance_km": 8, "goal_description": "Corra 8km, mantendo pace constante do in\u00edcio ao fim", "session": 27, "week": 14}, {"distance_km": 6, "goal_description": "Corra 6km, mantendo pace constante do in\u00edcio ao fim", "session": 28, "week": 14}, {"distance_km": 9, "goal_description": "Corra 9km, mantendo pace constante do in\u00edcio ao fim", "session": 29, "week": 15}, {"distance_km": 7, "goal_description": "Corra 7km, mantendo pace constante do in\u00edcio ao fim", "session": 30, "week": 15}, {"distance_km": 10, "goal_description": "Corra 10km, mantendo pace constante do in\u00edcio ao fim", "session": 31, "week": 16}, {"distance_km": 5, "goal_description": "Corra 5km, mantendo pace constante do in\u00edcio ao fim", "session": 32, "week": 16}];
        const TOTAL_SESSIONS = 32;

        const goalEl         = document.getElementById('goal-text');
        const sessionLabelEl = document.getElementById('session-label');
        const checkbox       = document.getElementById('running-done');
        const progressFill   = document.getElementById('progress-fill');
        const progressLabel  = document.getElementById('progress-label');

        const MONTH_NAMES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
        const DAY_HEADERS = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

        let calYear  = new Date().getFullYear();
        let calMonth = new Date().getMonth();

        function todayStr() {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        }
        function getState() {
            const raw = localStorage.getItem(LS_KEY);
            if (!raw) return { checked_dates: [], session_by_date: {} };
            try { const s = JSON.parse(raw); if (!s.session_by_date) s.session_by_date = {}; return s; }
            catch { return { checked_dates: [], session_by_date: {} }; }
        }
        function saveState(state) { localStorage.setItem(LS_KEY, JSON.stringify(state)); }

        function render() {
            const checkedDates = getState().checked_dates || [];
            const today = todayStr();
            const doneBefore = checkedDates.filter(d => d < today).length;
            const currentIdx = Math.min(doneBefore, TOTAL_SESSIONS - 1);
            const allDone = checkedDates.length >= TOTAL_SESSIONS;
            if (allDone) {
                goalEl.textContent = '10km concluídos! Parabéns!';
                goalEl.classList.add('done');
                sessionLabelEl.textContent = `${TOTAL_SESSIONS} de ${TOTAL_SESSIONS} sessões concluídas`;
            } else {
                const session = SESSIONS[currentIdx];
                goalEl.textContent = session.goal_description;
                goalEl.classList.remove('done');
                sessionLabelEl.textContent = `Sessão ${currentIdx + 1} de ${TOTAL_SESSIONS} · Semana ${session.week}`;
            }
            checkbox.checked = checkedDates.includes(today);
            const pct = (checkedDates.length / TOTAL_SESSIONS) * 100;
            progressFill.style.width = pct.toFixed(1) + '%';
            progressLabel.textContent = `${checkedDates.length} / ${TOTAL_SESSIONS} corridas`;
        }

        function toggleRunning(checked) {
            const state = getState();
            const today = todayStr();
            const dates = state.checked_dates || [];
            const sessionByDate = state.session_by_date || {};
            if (checked) {
                if (!dates.includes(today)) {
                    const doneBefore = dates.filter(d => d < today).length;
                    const currentIdx = Math.min(doneBefore, TOTAL_SESSIONS - 1);
                    dates.push(today);
                    sessionByDate[today] = currentIdx;
                }
            } else {
                const idx = dates.indexOf(today);
                if (idx !== -1) dates.splice(idx, 1);
                delete sessionByDate[today];
            }
            state.checked_dates = dates;
            state.session_by_date = sessionByDate;
            saveState(state);
            render();
            renderCalendar();
        }

        function renderCalendar() {
            const state = getState();
            const checkedDates  = state.checked_dates || [];
            const sessionByDate = state.session_by_date || {};
            const today = todayStr();
            document.getElementById('cal-month-label').textContent = `${MONTH_NAMES[calMonth]} ${calYear}`;
            const grid = document.getElementById('cal-grid');
            grid.innerHTML = '';
            DAY_HEADERS.forEach(d => {
                const el = document.createElement('div');
                el.className = 'cal-day-header';
                el.textContent = d;
                grid.appendChild(el);
            });
            const firstDow = new Date(calYear, calMonth, 1).getDay();
            for (let i = 0; i < firstDow; i++) {
                const el = document.createElement('div');
                el.className = 'cal-cell empty';
                grid.appendChild(el);
            }
            const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const el = document.createElement('div');
                el.className = 'cal-cell';
                el.textContent = d;
                const isDone  = checkedDates.includes(dateStr);
                const isToday = dateStr === today;
                const isFuture = dateStr > today;
                if (isDone)   el.classList.add('cal-done');
                if (isToday)  el.classList.add('cal-today');
                if (isFuture && !isDone) el.classList.add('cal-future');
                if (isDone) el.addEventListener('click', () => showCalDetail(dateStr, sessionByDate[dateStr]));
                grid.appendChild(el);
            }
        }

        function showCalDetail(dateStr, sessionIdx) {
            const detail = document.getElementById('cal-detail');
            if (sessionIdx === undefined || sessionIdx === null || !SESSIONS[sessionIdx]) { detail.style.display = 'none'; return; }
            const session = SESSIONS[sessionIdx];
            const [y, m, d] = dateStr.split('-');
            const metric = session.distance_km ? `${session.distance_km} km` : session.duration_minutes ? `${session.duration_minutes} min` : '';
            document.getElementById('cal-detail-date').textContent = `${d}/${m}/${y}`;
            document.getElementById('cal-detail-session').textContent = `Sessão ${session.session} de ${TOTAL_SESSIONS} · Semana ${session.week}${metric ? ' · ' + metric : ''}`;
            document.getElementById('cal-detail-goal').textContent = session.goal_description;
            detail.style.display = 'block';
        }

        function calPrev() {
            calMonth--;
            if (calMonth < 0) { calMonth = 11; calYear--; }
            document.getElementById('cal-detail').style.display = 'none';
            renderCalendar();
        }
        function calNext() {
            calMonth++;
            if (calMonth > 11) { calMonth = 0; calYear++; }
            document.getElementById('cal-detail').style.display = 'none';
            renderCalendar();
        }

        document.addEventListener('DOMContentLoaded', () => { render(); renderCalendar(); });
    </script>

</body>
</html>
